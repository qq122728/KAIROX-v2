  <ellipse cx="256" cy="362" rx="140" ry="22" fill="none" stroke="url(#ringSym)" stroke-width="3.5" opacity="0.55"/>
  <ellipse cx="256" cy="370" rx="90" ry="13" fill="none" stroke="url(#ringSym)" stroke-width="2" opacity="0.35"/>
