<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="kSym" x1="160" y1="120" x2="352" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8EDF3"/>
      <stop offset="0.5" stop-color="#C8D3E0"/>
      <stop offset="1" stop-color="#7F8FA3"/>
    </linearGradient>
    <linearGradient id="ringSym" x1="80" y1="320" x2="432" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5B8DFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5B8DFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5B8DFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="kGlow" x="-20%" y="-20%" width="140%" height="140%">
