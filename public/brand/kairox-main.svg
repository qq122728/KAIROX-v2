<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="textGrad" x1="100" y1="0" x2="1100" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0E6F0"/>
      <stop offset="0.35" stop-color="#FFFFFF"/>
      <stop offset="0.65" stop-color="#CCD5E2"/>
      <stop offset="1" stop-color="#8899B0"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B8DFF"/>
      <stop offset="1" stop-color="#3B6DDF"/>
    </linearGradient>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- K icon -->
  <path d="M40 50 L40 260 L70 260 L70 180 L200 260 L240 250 L110 165 L230 50 L180 50 L80 140 L70 120 L70 50 Z" fill="url(#textGrad)" filter="url(#textGlow)"/>
  <!-- KAIROX text -->
  <text x="270" y="198" font-family="Inter, 'DM Sans', system-ui, sans-serif" font-weight="700" font-size="110" fill="url(#textGrad)" filter="url(#textGlow)" letter-spacing="6">KAIROX</text>
  <!-- Blue dot -->
  <circle cx="1070" cy="155" r="10" fill="url(#dotGrad)"/>
</svg>
